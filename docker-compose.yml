services:
  postgres:
    image: postgres:16-alpine
    container_name: hf-planner-db
    environment:
      POSTGRES_USER: hfplanner
      POSTGRES_PASSWORD: hfplanner
      POSTGRES_DB: hfplanner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hfplanner"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
