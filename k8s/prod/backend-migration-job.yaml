apiVersion: batch/v1
kind: Job
metadata:
  name: backend-migration
  namespace: hf-planner-prod
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: backend-migration
    spec:
      restartPolicy: OnFailure
      containers:
      - name: migration
        image: longepierre/hf-planner-backend:latest
        command: ["poetry", "run", "alembic", "upgrade", "head"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: DATABASE_URL
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: JWT_SECRET_KEY
        - name: JWT_ALGORITHM
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: JWT_ALGORITHM
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "400m"
