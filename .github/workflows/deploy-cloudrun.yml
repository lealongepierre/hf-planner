name: Deploy to Cloud Run

on:
  workflow_dispatch: # Manual trigger only

env:
  GCP_REGION: europe-west1
  BACKEND_IMAGE: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/hf-planner/backend
  FRONTEND_IMAGE: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/hf-planner/frontend
  CLOUD_SQL_INSTANCE: ${{ secrets.GCP_PROJECT_ID }}:europe-west1:hf-planner-db

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build and push backend
        run: |
          docker build -t ${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
                        -t ${{ env.BACKEND_IMAGE }}:latest \
                        ./backend
          docker push ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend
        run: |
          docker build -t ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
                        -t ${{ env.FRONTEND_IMAGE }}:latest \
                        ./frontend
          docker push ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.FRONTEND_IMAGE }}:latest

  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Run Alembic migrations via Cloud Run Job
        run: |
          gcloud run jobs deploy migrate \
            --image ${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --set-env-vars "DATABASE_URL=${{ secrets.DATABASE_URL }},JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}" \
            --set-cloudsql-instances ${{ env.CLOUD_SQL_INSTANCE }} \
            --command "alembic" \
            --args "upgrade,head" \
            --wait \
            --quiet

          gcloud run jobs execute migrate \
            --region ${{ env.GCP_REGION }} \
            --wait \
            --quiet

      - name: Seed database with concert data
        run: |
          gcloud run jobs deploy seed \
            --image ${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --set-env-vars "DATABASE_URL=${{ secrets.DATABASE_URL }},JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}" \
            --set-cloudsql-instances ${{ env.CLOUD_SQL_INSTANCE }} \
            --command "python,-m,app.utils.seed" \
            --wait \
            --quiet

          gcloud run jobs execute seed \
            --region ${{ env.GCP_REGION }} \
            --wait \
            --quiet

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: migrate

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy backend
        run: |
          gcloud run deploy backend \
            --image ${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --set-env-vars "\
              DATABASE_URL=${{ secrets.DATABASE_URL }},\
              JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }},\
              JWT_ALGORITHM=HS256,\
              JWT_ACCESS_TOKEN_EXPIRE_MINUTES=30" \
            --set-cloudsql-instances ${{ env.CLOUD_SQL_INSTANCE }} \
            --allow-unauthenticated \
            --port 8000 \
            --min-instances 0 \
            --max-instances 3 \
            --memory 512Mi \
            --quiet

      - name: Get backend URL
        id: backend-url
        run: |
          URL=$(gcloud run services describe backend \
            --region ${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Backend URL: $URL"

      - name: Deploy frontend
        run: |
          gcloud run deploy frontend \
            --image ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --set-env-vars "BACKEND_URL=${{ steps.backend-url.outputs.url }}" \
            --allow-unauthenticated \
            --port 8080 \
            --min-instances 0 \
            --max-instances 2 \
            --memory 256Mi \
            --quiet

      - name: Show deployment URLs
        run: |
          echo "=== Deployment Complete ==="
          echo "Backend:  ${{ steps.backend-url.outputs.url }}"
          FRONTEND_URL=$(gcloud run services describe frontend \
            --region ${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "Frontend: $FRONTEND_URL"
